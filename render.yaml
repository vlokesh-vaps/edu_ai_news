services:
  - type: web
    name: feedback-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Use Gunicorn with the Uvicorn worker for production stability and to honor $PORT
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2 --log-level info
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GROQ_API_KEY
        sync: false